<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix – Deine Filmdatenbank</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>


<nav class="topbar">
  <div class="topbar-inner">
    <div class="nav-pillbar">
      <div class="pill-logo">PHOENIX</div>

      <button class="nav-pill active" id="navMain">🎬 Entdecken</button>

      <span class="nav-pill ghost">🔥 Trending</span>
      <span class="nav-pill ghost">⭐ Top Rated</span>
    </div>

    <div class="search-bar">
      <input
        type="text"
        id="searchInput"
        placeholder="Filme & Serien suchen…"
        onkeydown="if(event.key==='Enter') doSearch()"
      />
      <button onclick="doSearch()">Suchen</button>
    </div>
  </div>
</nav>

<div class="filters">
  <span class="filter-label">Typ:</span>
  <div class="filter-group">  
    <button class="filter-chip active" onclick="setType(this,'all')">Alle</button>
    <button class="filter-chip" onclick="setType(this,'movie')">🎬 Filme</button>
    <button class="filter-chip" onclick="setType(this,'tv')">📺 Serien</button>
  </div>
  <span class="filter-label">Sortieren:</span>
  <select class="fsel" id="sortSel" onchange="applySort()">
    <option value="popularity">Beliebtheit</option>
    <option value="rating">TMDB Bewertung</option>
    <option value="name">Name (A–Z)</option>
    <option value="year">Erscheinungsjahr</option>
  </select>
  <button class="reset-btn" onclick="resetFilters()">✕ Reset</button>
</div>

<!-- ── MAIN ── -->
<main>
  <div class="section-title">Trending Today <small id="resultCount"></small></div>
  <div id="content"></div>
</main>

<!-- ── MODAL (GEÄNDERT) ── -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div id="modalContent"></div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<!-- ── FOOTER ── -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="footer-logo">PHOENIX</span>
      
    </div>
    <div class="footer-divider"></div>
    <nav class="footer-nav">
      <a href="about.html" class="footer-link"><span class="footer-link-icon">✦</span> About</a>
      <a href="contact.html" class="footer-link"><span class="footer-link-icon">✦</span> Contact</a>
    </nav>
    <div class="footer-divider"></div>
    <div class="footer-bottom">
      <span>Daten von <strong>TMDB</strong> – The Movie Database</span>
      <span class="footer-copy">© 2026 Phoenix</span>
    </div>
  </div>
</footer>

<script type="module" src="main.js"></script>
</body>
</html>
