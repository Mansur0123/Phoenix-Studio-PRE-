
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix – Deine Filmdatenbank</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="topbar">
  <div class="topbar-inner">

    <div class="nav-pillbar">
      <div class="pill-logo">
        <span class="logo-left">PHO</span><span class="logo-right">ENIX</span>
      </div>

      <button class="nav-pill active" id="navMain" onclick="goHome()">Entdecken</button>
      <button class="nav-pill watchlist-btn" onclick="window.location.href='watchlist.html'">Watchlist</button>
    </div>

    <div class="search-bar">
      <input
        type="text"
        id="searchInput"
        placeholder="Filme & Serien suchen…"
        onkeydown="if(event.key==='Enter') doSearch()"
      />
      <button onclick="doSearch()">Suchen</button>
    </div>

    <div id="authSlot" class="auth-slot"></div>

  </div>
</nav>

<!-- FILTER -->
<div class="filters">
  <div class="filter-group-row">

    <div class="filter-dropdown-wrap">
      <label class="filter-label">Typ</label>
      <div class="custom-select-wrap">
        <select class="custom-select" id="typeSel" onchange="applyTypeFilter(this)">
          <option value="all">Alle</option>
          <option value="movie">Filme</option>
          <option value="tv">Serien</option>
        </select>
        <span class="select-arrow">▾</span>
      </div>
    </div>

    <div class="filter-dropdown-wrap">
      <label class="filter-label">Sortieren</label>
      <div class="custom-select-wrap">
        <select class="custom-select" id="sortSel" onchange="applySort()">
          <option value="" selected>Category</option>
          <option value="popularity">Beliebtheit</option>
          <option value="rating">TMDB Bewertung</option>
          <option value="name">Name (A–Z)</option>
          <option value="year">Erscheinungsjahr</option>
        </select>
        <span class="select-arrow">▾</span>
      </div>
    </div>

    <div class="filter-dropdown-wrap">
  <label class="filter-label">Genre</label>
  <div class="custom-select-wrap">
    <select class="custom-select" id="genreSel" onchange="applyGenreFilter()">
      <option value="all">Alle</option>
      <option value="28">Action</option>
      <option value="35">Comedy</option>
      <option value="18">Drama</option>
      <option value="10749">Romance</option>
      <option value="27">Horror</option>
<!--
<option value="878">Sci-Fi</option>
<option value="878">Mystery</option>
<option value="878">Fantasy</option>
<option value="878">Krimi</option>
<option value="878">Western</option>
<option value="878">Dokumentation</option>
<option value="878">Musik</option>
<option value="878">Krieg</option>
<option value="878">Historie</option>
<option value="878">TV-Film</option>
<option value="878">Animation</option>
<option value="878">Familie</option>
<option value="878">Abenteuer</option>
<option value="878">Thriller</option>
-->



    </select>
    <span class="select-arrow">▾</span>
  </div>
</div>

    <button class="reset-btn" onclick="resetFilters()">✕ Reset</button>

  </div>
</div>

<!-- MAIN -->
<main>
  <div class="section-title">
    Trending Today <small id="resultCount"></small>
  </div>
  <div id="content"></div>
</main>

<!-- FILM MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div id="modalContent"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsOverlay" onclick="if(event.target===this) closeSettings()">
  <div class="modal">
    <div class="modal-inner">


      <div class="modal-section">
        <div class="modal-section-title">Darstellung</div>
        <label>
          <input type="checkbox" id="darkModeToggle" checked>
          Dark Mode
        </label>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Sonstiges</div>
        <button class="btn-secondary" onclick="clearWatchlist()">
          Watchlist löschen
        </button>
      </div>

      <div class="modal-footer">
        <button class="btn-primary" onclick="closeSettings()">Schließen</button>
      </div>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-inner">

    <div class="footer-brand">
      <div class="pill-logo">
      <span class="logo-left">PHO</span><span class="logo-right">ENIX</span>
      </div>
    </div>

    <div class="footer-divider"></div>

    <nav class="footer-nav">
      <a href="about.html" class="footer-link"><span class="footer-link-icon">✦</span> About</a>
      <a href="contact.html" class="footer-link"><span class="footer-link-icon">✦</span> Contact</a>
    </nav>

    <div class="footer-divider"></div>

    <div class="footer-bottom">
      <span>Daten von <strong>TMDB</strong> – The Movie Database</span>
      <span class="footer-copy">© 2026 Phoenix</span>
    </div>

  </div>
</footer>

<script type="module" src="main.js"></script>

</body>
